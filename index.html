<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNG AI Social Assistant</title>
    <script>
        // Aapki API Key yahan set hai
        window.apiKey = "AIzaSyDUg3RRAgCkC1SLop-QyIZTG7crtLW0y9k";
    </script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .chat-card { background: #1e293b; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; border: 1px solid #334155; border-radius: 10px; padding: 10px; font-size: 16px; box-sizing: border-box; resize: none; background: #0f172a; color: white; }
        button { background: #38bdf8; color: #0f172a; border: none; width: 100%; padding: 12px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #result { margin-top: 20px; text-align: left; font-size: 14px; color: #cbd5e1; max-height: 150px; overflow-y: auto; background: #334155; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="chat-card">
    <h2>🚀 GNG AI App</h2>
    <textarea id="userInput" placeholder="Yahan apna sawal likhein..."></textarea>
    <button onclick="askGemini()">AI se Poochein</button>
    <div id="result"></div>
</div>

<script>
    async function askGemini() {
        const input = document.getElementById('userInput').value;
        const resDiv = document.getElementById('result');
        if (!input) return alert("Kuch likhein!");

        resDiv.style.display = "block";
        resDiv.innerHTML = "<b>AI Soch raha hai...</b>";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${window.apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
            });
            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            resDiv.innerHTML = "<b>Jawab:</b><br>" + text.replace(/\n/g, "<br>");
        } catch (e) {
            resDiv.innerHTML = "<span style='color:red'>Error: Key check karein ya quota khatam ho gaya hai.</span>";
        }
    }
</script>

</body>
</html>
